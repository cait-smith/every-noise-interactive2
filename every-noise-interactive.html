<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Every Noise at Once - Interactive Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #ccc;
    font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #0a0a0f;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: 16px 24px;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    font-weight: 500;
    color: #e8e8ec;
    letter-spacing: -0.2px;
    text-transform: lowercase;
  }

  .stats {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    color: #555;
    letter-spacing: 0.3px;
  }

  .stats span {
    color: #999;
    font-weight: 500;
  }

  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  .search-box {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-box input {
    width: 100%;
    padding: 8px 12px 8px 30px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    background: rgba(255,255,255,0.05);
    color: #eee;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2px;
    outline: none;
    transition: all 0.2s;
  }

  .search-box input:focus {
    border-color: rgba(122, 143, 166, 0.5);
    background: rgba(255,255,255,0.08);
    box-shadow: 0 0 20px rgba(122, 143, 166, 0.08);
  }

  .search-box::before {
    content: "\u{1F50D}";
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.65rem;
    opacity: 0.4;
    pointer-events: none;
  }

  .view-btns {
    display: flex;
    gap: 2px;
    background: rgba(255,255,255,0.04);
    border-radius: 4px;
    padding: 3px;
  }

  .view-btn {
    padding: 7px 14px;
    border: none;
    border-radius: 4px;
    background: transparent;
    color: #888;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    font-weight: 400;
    letter-spacing: 0.5px;
    text-transform: lowercase;
    transition: all 0.2s;
  }

  .view-btn.active {
    background: rgba(255,255,255,0.1);
    color: #fff;
  }

  .view-btn:hover:not(.active) {
    color: #bbb;
  }

  .sort-select {
    padding: 8px 12px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    background: rgba(255,255,255,0.05);
    color: #ccc;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2px;
    outline: none;
    cursor: pointer;
  }

  .sort-select option { background: #1a1a2e; }

  .letter-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    margin-top: 10px;
    justify-content: center;
  }

  .letter-btn {
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    border-radius: 3px;
    background: transparent;
    color: #555;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    font-weight: 400;
    transition: all 0.15s;
  }

  .letter-btn:hover { background: rgba(255,255,255,0.08); color: #ccc; }
  .letter-btn.active { background: rgba(122, 143, 166, 0.2); color: #a0b4c8; }
  .letter-btn.has-genres { color: #999; }

  /* Cloud View */
  .cloud-container {
    padding: 30px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 4px 10px;
    min-height: 80vh;
    transition: opacity 0.3s;
  }

  .genre-cloud {
    cursor: pointer;
    padding: 3px 6px;
    border-radius: 4px;
    transition: all 0.2s;
    white-space: nowrap;
    line-height: 1.5;
    position: relative;
  }

  .genre-cloud:hover {
    transform: scale(1.15);
    z-index: 10;
    filter: brightness(1.4);
    text-shadow: 0 0 20px currentColor;
  }

  .genre-cloud.dimmed { opacity: 0.08; }
  .genre-cloud.highlighted { opacity: 1 !important; transform: scale(1.1); }

  /* Grid View */
  .grid-container {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 8px;
    min-height: 80vh;
  }

  .genre-card {
    padding: 12px 14px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 4px;
    background: rgba(255,255,255,0.02);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .genre-card:hover {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.12);
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(0,0,0,0.3);
  }

  .genre-card .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .genre-card .name {
    font-size: 0.68rem;
    color: #ccc;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    letter-spacing: 0.2px;
  }

  .genre-card.dimmed { opacity: 0.08; }
  .genre-card.highlighted { opacity: 1 !important; border-color: rgba(255,255,255,0.2); }

  /* List View */
  .list-container {
    padding: 20px;
    max-width: 700px;
    margin: 0 auto;
    min-height: 80vh;
  }

  .genre-list-item {
    padding: 10px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.15s;
  }

  .genre-list-item:hover {
    background: rgba(255,255,255,0.04);
  }

  .genre-list-item .idx {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: #3a3a3a;
    min-width: 32px;
    text-align: right;
  }

  .genre-list-item .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .genre-list-item .name {
    font-size: 0.72rem;
    color: #ccc;
    letter-spacing: 0.2px;
  }

  .genre-list-item.dimmed { opacity: 0.08; }
  .genre-list-item.highlighted { opacity: 1 !important; }

  /* Detail panel */
  .detail-panel {
    position: fixed;
    bottom: -500px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20, 20, 35, 0.97);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px 16px 0 0;
    padding: 20px 28px 24px;
    z-index: 200;
    transition: bottom 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    width: 600px;
    max-width: 95vw;
    text-align: center;
    box-shadow: 0 -10px 40px rgba(0,0,0,0.4);
  }

  .detail-panel.visible { bottom: 0; }

  .detail-panel .genre-name {
    font-size: 1rem;
    font-weight: 500;
    margin-bottom: 8px;
    letter-spacing: -0.2px;
  }

  .detail-panel .genre-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    color: #666;
    margin-bottom: 14px;
    letter-spacing: 0.3px;
  }

  .detail-actions {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* Artists section */
  .artists-section {
    margin-top: 18px;
    border-top: 1px solid rgba(255,255,255,0.08);
    padding-top: 14px;
  }

  .artists-heading {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
  }

  .artists-grid {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 6px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .artist-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    color: #ccc;
    transition: all 0.2s;
    min-width: 80px;
    max-width: 90px;
  }

  .artist-card:hover {
    color: #fff;
    transform: translateY(-3px);
  }

  .artist-card img {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(255,255,255,0.08);
    transition: border-color 0.2s;
    background: rgba(255,255,255,0.05);
  }

  .artist-card:hover img {
    border-color: rgba(255,255,255,0.25);
  }

  .artist-card .artist-name {
    font-size: 0.68rem;
    text-align: center;
    line-height: 1.3;
    letter-spacing: 0.1px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .artists-loading {
    font-size: 0.8rem;
    color: #555;
    padding: 16px 0;
  }

  .artists-loading .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.1);
    border-top-color: #7a8fa6;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .artists-error {
    font-size: 0.78rem;
    color: #666;
    padding: 10px 0;
  }

  .detail-btn {
    padding: 8px 16px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    background: rgba(255,255,255,0.04);
    color: #bbb;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
  }

  .detail-btn:hover {
    background: rgba(255,255,255,0.1);
    color: #fff;
  }

  .close-btn {
    position: absolute;
    top: 10px;
    right: 14px;
    background: none;
    border: none;
    color: #666;
    font-size: 1.2rem;
    cursor: pointer;
  }

  .close-btn:hover { color: #aaa; }

  /* Favorites */
  .fav-star {
    opacity: 0;
    transition: opacity 0.15s;
    font-size: 0.7rem;
    cursor: pointer;
  }

  .genre-card:hover .fav-star,
  .genre-list-item:hover .fav-star,
  .fav-star.active { opacity: 1; }

  .fav-star.active { color: #ffd56b; }

  .fav-filter {
    padding: 7px 14px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    background: transparent;
    color: #888;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .fav-filter.active {
    background: rgba(255, 213, 107, 0.12);
    border-color: rgba(255, 213, 107, 0.3);
    color: #ffd56b;
  }

  /* No results */
  .no-results {
    text-align: center;
    padding: 80px 20px;
    color: #555;
    font-size: 0.95rem;
  }

  .no-results .big { font-size: 2.5rem; margin-bottom: 12px; }

  /* Random button */
  .random-btn {
    padding: 8px 14px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    background: rgba(122, 143, 166, 0.08);
    color: #8a9fb5;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .random-btn:hover {
    background: rgba(122, 143, 166, 0.15);
    border-color: rgba(122, 143, 166, 0.3);
  }

  @media (max-width: 600px) {
    header { padding: 12px 14px; }
    h1 { font-size: 0.78rem; }
    .controls { gap: 6px; }
    .cloud-container { padding: 14px; gap: 2px 6px; }
    .grid-container { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); padding: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1><a href="https://everynoise.com" target="_blank" style="color:inherit;text-decoration:none;">Every Noise at Once</a></h1>
    <div class="stats">
      <span id="genreCount">0</span> genres &middot;
      showing <span id="visibleCount">0</span>
    </div>
  </div>
  <div class="controls">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search genres..." autocomplete="off" spellcheck="false">
    </div>
    <div class="view-btns">
      <button class="view-btn active" data-view="cloud">Cloud</button>
      <button class="view-btn" data-view="grid">Grid</button>
      <button class="view-btn" data-view="list">List</button>
    </div>
    <select class="sort-select" id="sortSelect">
      <option value="default">Default order</option>
      <option value="alpha">A &rarr; Z</option>
      <option value="alpha-desc">Z &rarr; A</option>
      <option value="length">Shortest name</option>
      <option value="length-desc">Longest name</option>
      <option value="random">Shuffle</option>
    </select>
    <button class="fav-filter" id="favFilter">&#9733; Favorites</button>
    <button class="random-btn" id="randomBtn">&#127922; Random</button>
  </div>
  <div class="letter-nav" id="letterNav"></div>
</header>

<main id="mainContent">
  <div class="cloud-container" id="cloudView"></div>
  <div class="grid-container" id="gridView" style="display:none"></div>
  <div class="list-container" id="listView" style="display:none"></div>
</main>

<div class="detail-panel" id="detailPanel">
  <button class="close-btn" id="closeDetail">&times;</button>
  <div class="genre-name" id="detailName"></div>
  <div class="genre-meta" id="detailMeta"></div>
  <div class="detail-actions">
    <a class="detail-btn" id="spotifyLink" href="#" target="_blank">&#127925; Spotify</a>
    <a class="detail-btn" id="youtubeLink" href="#" target="_blank">&#9654; YouTube</a>
    <a class="detail-btn" id="wikiLink" href="#" target="_blank">&#128218; Wikipedia</a>
    <button class="detail-btn" id="detailFav">&#9733; Favorite</button>
  </div>
  <div class="artists-section" id="artistsSection">
    <div class="artists-heading">Artists in this genre</div>
    <div id="artistsContent">
      <div class="artists-loading"><span class="spinner"></span> Finding artists...</div>
    </div>
  </div>
</div>

let favorites = JSON.parse(localStorage.getItem('enao-favs') || '[]');
let currentView = 'cloud';
let activeLetter = null;
let showFavsOnly = false;

// Dark & moody palette - lightened for readability
const PALETTE = [
  '#a3b8cc', // slate blue
  '#c9ad9a', // dusty clay
  '#b09fc4', // muted plum
  '#8fb8b2', // sage
  '#cfaa88', // warm sienna
  '#a3b08e', // olive
  '#c09e9e', // dusty rose
  '#8ea6c4', // steel blue
];

function genreColor(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) {
    hash = name.charCodeAt(i) + ((hash << 5) - hash);
  }
  return PALETTE[((hash % PALETTE.length) + PALETTE.length) % PALETTE.length];
}

function genreFontSize(index, total) {
  // Larger for "more popular" genres (earlier in list = more popular on everynoise)
  const ratio = 1 - (index / total);
  const min = 0.45, max = 1.15;
  return min + (ratio * ratio) * (max - min);
}

function getFilteredGenres() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let genres = ALL_GENRES.map((g, i) => ({ name: g, origIndex: i }));

  if (activeLetter) {
    genres = genres.filter(g => g.name[0].toUpperCase() === activeLetter);
  }
  if (showFavsOnly) {
    genres = genres.filter(g => favorites.includes(g.name));
  }

  const sort = document.getElementById('sortSelect').value;
  switch (sort) {
    case 'alpha': genres.sort((a, b) => a.name.localeCompare(b.name)); break;
    case 'alpha-desc': genres.sort((a, b) => b.name.localeCompare(a.name)); break;
    case 'length': genres.sort((a, b) => a.name.length - b.name.length); break;
    case 'length-desc': genres.sort((a, b) => b.name.length - a.name.length); break;
    case 'random': genres.sort(() => Math.random() - 0.5); break;
  }

  return { genres, query: q };
}

function renderCloud() {
  const container = document.getElementById('cloudView');
  const { genres, query } = getFilteredGenres();

  container.innerHTML = genres.map(({ name, origIndex }) => {
    const size = genreFontSize(origIndex, ALL_GENRES.length);
    const color = genreColor(name);
    const match = query && name.includes(query);
    const dim = query && !match;
    const cls = dim ? 'genre-cloud dimmed' : query && match ? 'genre-cloud highlighted' : 'genre-cloud';
    return `<span class="${cls}" style="font-size:${size}rem;color:${color}" data-genre="${name}">${name}</span>`;
  }).join('');

  if (genres.length === 0) {
    container.innerHTML = '<div class="no-results"><div class="big">~</div>No genres found</div>';
  }

  updateCounts(genres.length, query);
}

function renderGrid() {
  const container = document.getElementById('gridView');
  const { genres, query } = getFilteredGenres();

  container.innerHTML = genres.map(({ name }) => {
    const color = genreColor(name);
    const match = query && name.includes(query);
    const dim = query && !match;
    const cls = dim ? 'genre-card dimmed' : query && match ? 'genre-card highlighted' : 'genre-card';
    const isFav = favorites.includes(name);
    return `<div class="${cls}" data-genre="${name}">
      <span class="dot" style="background:${color}"></span>
      <span class="name">${name}</span>
      <span class="fav-star ${isFav ? 'active' : ''}" data-fav="${name}">${isFav ? '\u2605' : '\u2606'}</span>
    </div>`;
  }).join('');

  if (genres.length === 0) {
    container.innerHTML = '<div class="no-results"><div class="big">~</div>No genres found</div>';
  }

  updateCounts(genres.length, query);
}

function renderList() {
  const container = document.getElementById('listView');
  const { genres, query } = getFilteredGenres();

  container.innerHTML = genres.map(({ name }, i) => {
    const color = genreColor(name);
    const match = query && name.includes(query);
    const dim = query && !match;
    const cls = dim ? 'genre-list-item dimmed' : query && match ? 'genre-list-item highlighted' : 'genre-list-item';
    const isFav = favorites.includes(name);
    return `<div class="${cls}" data-genre="${name}">
      <span class="idx">${i + 1}</span>
      <span class="dot" style="background:${color}"></span>
      <span class="name">${name}</span>
      <span class="fav-star ${isFav ? 'active' : ''}" data-fav="${name}">${isFav ? '\u2605' : '\u2606'}</span>
    </div>`;
  }).join('');

  if (genres.length === 0) {
    container.innerHTML = '<div class="no-results"><div class="big">~</div>No genres found</div>';
  }

  updateCounts(genres.length, query);
}

function render() {
  if (currentView === 'cloud') renderCloud();
  else if (currentView === 'grid') renderGrid();
  else renderList();
}

function updateCounts(visible, query) {
  document.getElementById('genreCount').textContent = ALL_GENRES.length;
  document.getElementById('visibleCount').textContent = query
    ? document.querySelectorAll('.highlighted').length + ' matches'
    : visible;
}

// Letter nav
function buildLetterNav() {
  const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  const usedLetters = new Set(ALL_GENRES.map(g => g[0].toUpperCase()));
  const nav = document.getElementById('letterNav');
  nav.innerHTML = `<button class="letter-btn ${!activeLetter ? 'active' : ''}" data-letter="">ALL</button>` +
    letters.map(l => {
      const has = usedLetters.has(l);
      return `<button class="letter-btn ${has ? 'has-genres' : ''} ${activeLetter === l ? 'active' : ''}" data-letter="${l}" ${!has ? 'disabled' : ''}>${l}</button>`;
    }).join('');
}

// Detail panel
let currentFetchId = 0;

function showDetail(genreName) {
  const panel = document.getElementById('detailPanel');
  const color = genreColor(genreName);
  document.getElementById('detailName').textContent = genreName;
  document.getElementById('detailName').style.color = color;

  const firstLetter = genreName[0].toUpperCase();
  const wordCount = genreName.split(/[\s-]+/).length;
  const rank = ALL_GENRES.indexOf(genreName) + 1;
  document.getElementById('detailMeta').textContent = `#${rank} of ${ALL_GENRES.length} \u2022 ${wordCount} word${wordCount > 1 ? 's' : ''} \u2022 starts with "${firstLetter}"`;

  const q = encodeURIComponent(genreName + ' music');
  document.getElementById('spotifyLink').href = `https://open.spotify.com/search/${encodeURIComponent(genreName)}`;
  document.getElementById('youtubeLink').href = `https://www.youtube.com/results?search_query=${q}`;
  document.getElementById('wikiLink').href = `https://en.wikipedia.org/wiki/${encodeURIComponent(genreName.replace(/ /g, '_'))}`;

  const isFav = favorites.includes(genreName);
  document.getElementById('detailFav').textContent = isFav ? '\u2605 Unfavorite' : '\u2606 Favorite';
  document.getElementById('detailFav').dataset.genre = genreName;

  // Fetch artists
  fetchArtists(genreName);

  panel.classList.add('visible');
}

function fetchArtists(genreName) {
  const container = document.getElementById('artistsContent');
  container.innerHTML = '<div class="artists-loading"><span class="spinner"></span> Finding artists...</div>';

  const fetchId = ++currentFetchId;

  // Use Deezer API to search for artists by genre
  const searchQuery = encodeURIComponent(genreName);
  const url = `https://api.deezer.com/search?q=${searchQuery}&limit=12&output=jsonp&callback=deezerCallback_${fetchId}`;

  // JSONP approach for cross-origin
  const callbackName = `deezerCallback_${fetchId}`;

  window[callbackName] = function(data) {
    // Ignore if a newer fetch has started
    if (fetchId !== currentFetchId) return;

    // Clean up
    delete window[callbackName];
    const scriptEl = document.getElementById('deezer-script');
    if (scriptEl) scriptEl.remove();

    if (!data || !data.data || data.data.length === 0) {
      container.innerHTML = '<div class="artists-error">No artists found. Try the Spotify or YouTube links above.</div>';
      return;
    }

    // Deduplicate artists by ID, keep first occurrence
    const seen = new Set();
    const artists = [];
    for (const track of data.data) {
      if (track.artist && !seen.has(track.artist.id)) {
        seen.add(track.artist.id);
        artists.push({
          name: track.artist.name,
          picture: track.artist.picture_medium || track.artist.picture,
          link: track.artist.link || `https://www.deezer.com/artist/${track.artist.id}`,
          trackTitle: track.title
        });
      }
      if (artists.length >= 6) break;
    }

    if (artists.length === 0) {
      container.innerHTML = '<div class="artists-error">No artists found. Try the Spotify or YouTube links above.</div>';
      return;
    }

    container.innerHTML = '<div class="artists-grid">' +
      artists.map(a => {
        const spotifySearch = `https://open.spotify.com/search/${encodeURIComponent(a.name)}`;
        return `<a class="artist-card" href="${spotifySearch}" target="_blank" title="${a.name} - ${a.trackTitle}">
          <img src="${a.picture}" alt="${a.name}" loading="lazy" onerror="this.style.display='none'">
          <span class="artist-name">${a.name}</span>
        </a>`;
      }).join('') +
      '</div>';
  };

  // Timeout fallback
  const timeout = setTimeout(() => {
    if (fetchId !== currentFetchId) return;
    if (window[callbackName]) {
      delete window[callbackName];
      // Fallback: try fetch with cors-anywhere or just show a message
      fetchArtistsFallback(genreName, fetchId);
    }
  }, 5000);

  // Inject JSONP script
  const oldScript = document.getElementById('deezer-script');
  if (oldScript) oldScript.remove();
  const script = document.createElement('script');
  script.id = 'deezer-script';
  script.src = url;
  script.onerror = () => {
    if (fetchId !== currentFetchId) return;
    clearTimeout(timeout);
    delete window[callbackName];
    fetchArtistsFallback(genreName, fetchId);
  };
  document.body.appendChild(script);
}

function fetchArtistsFallback(genreName, fetchId) {
  const container = document.getElementById('artistsContent');

  // Try iTunes Search API as fallback (supports CORS)
  const searchQuery = encodeURIComponent(genreName);
  fetch(`https://itunes.apple.com/search?term=${searchQuery}&entity=musicArtist&limit=6`)
    .then(r => r.json())
    .then(data => {
      if (fetchId !== currentFetchId) return;
      if (!data.results || data.results.length === 0) {
        container.innerHTML = '<div class="artists-error">Could not load artists. Try the Spotify or YouTube links above.</div>';
        return;
      }
      container.innerHTML = '<div class="artists-grid">' +
        data.results.map(a => {
          const img = a.artistLinkUrl ? '' : '';
          const spotifySearch = `https://open.spotify.com/search/${encodeURIComponent(a.artistName)}`;
          return `<a class="artist-card" href="${spotifySearch}" target="_blank" title="${a.artistName}">
            <img src="${(a.artworkUrl100 || '').replace('100x100','200x200')}" alt="${a.artistName}" loading="lazy" style="${a.artworkUrl100 ? '' : 'display:none'}" onerror="this.style.display='none'">
            <span class="artist-name">${a.artistName}</span>
          </a>`;
        }).join('') +
        '</div>';
    })
    .catch(() => {
      if (fetchId !== currentFetchId) return;
      container.innerHTML = '<div class="artists-error">Could not load artists. Try the Spotify or YouTube links above.</div>';
    });
}

function hideDetail() {
  document.getElementById('detailPanel').classList.remove('visible');
}

// Toggle favorite
function toggleFav(name) {
  const idx = favorites.indexOf(name);
  if (idx > -1) favorites.splice(idx, 1);
  else favorites.push(name);
  localStorage.setItem('enao-favs', JSON.stringify(favorites));
  render();
}

// Event listeners
document.getElementById('searchInput').addEventListener('input', render);

document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    document.getElementById('cloudView').style.display = currentView === 'cloud' ? '' : 'none';
    document.getElementById('gridView').style.display = currentView === 'grid' ? '' : 'none';
    document.getElementById('listView').style.display = currentView === 'list' ? '' : 'none';
    render();
  });
});

document.getElementById('sortSelect').addEventListener('change', render);

document.getElementById('letterNav').addEventListener('click', e => {
  const btn = e.target.closest('.letter-btn');
  if (!btn || btn.disabled) return;
  activeLetter = btn.dataset.letter || null;
  buildLetterNav();
  render();
});

document.getElementById('mainContent').addEventListener('click', e => {
  const fav = e.target.closest('.fav-star');
  if (fav) {
    e.stopPropagation();
    toggleFav(fav.dataset.fav);
    return;
  }
  const el = e.target.closest('[data-genre]');
  if (el) showDetail(el.dataset.genre);
});

document.getElementById('closeDetail').addEventListener('click', hideDetail);

document.getElementById('detailFav').addEventListener('click', function() {
  const name = this.dataset.genre;
  toggleFav(name);
  const isFav = favorites.includes(name);
  this.textContent = isFav ? '\u2605 Unfavorite' : '\u2606 Favorite';
});

document.getElementById('favFilter').addEventListener('click', function() {
  showFavsOnly = !showFavsOnly;
  this.classList.toggle('active', showFavsOnly);
  render();
});

document.getElementById('randomBtn').addEventListener('click', () => {
  const randomGenre = ALL_GENRES[Math.floor(Math.random() * ALL_GENRES.length)];
  showDetail(randomGenre);
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') hideDetail();
  if (e.key === '/' && document.activeElement !== document.getElementById('searchInput')) {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

// Init
buildLetterNav();
render();
</script>
